<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Lumina — Browse</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<nav>
  <div class="nav-logo">Lumina<span class="dot">.</span></div>
  <div class="nav-links">
    <a href="/browse" class="nav-link active">Browse</a>
  </div>
  <div class="nav-right">
    <span class="nav-chip" id="nav-chip">CONSUMER</span>
    <span style="font-size:12px;color:var(--ink-3);letter-spacing:.5px" id="nav-user"></span>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
  </div>
</nav>

<div class="container page-wrap">

  <div class="page-header">
    <h1 class="page-title">The <span class="accent">archive,</span><br/>open to all.</h1>
    <p class="page-sub">Photographs uploaded by creators on Lumina. Search by title, tag, or location.</p>
  </div>

  <!-- Search is the focal input — large, underlined -->
  <div class="search-wrap">
    <input class="search-input" id="search-input" placeholder="Search by title, tag, location…" type="text"/>
    <button class="btn btn-ghost btn-sm" onclick="doSearch()">Search →</button>
    <button class="btn btn-ghost btn-sm" onclick="clearSearch()" style="color:var(--ink-3)">Clear</button>
  </div>

  <div id="search-label" style="display:none;font-size:11px;color:var(--ink-3);margin-bottom:1.5rem;letter-spacing:1.2px;text-transform:uppercase"></div>

  <div id="photo-grid" class="photo-grid"></div>

  <div id="grid-loader" class="loader-wrap" style="display:none">
    <div class="spinner"></div><span>Loading</span>
  </div>

  <div id="empty" class="empty-state" style="display:none">
    <span class="empty-icon">◌</span>
    <div class="empty-title">Nothing to show</div>
    <div class="empty-sub">Try a different query, or check back later.</div>
  </div>

  <div style="text-align:center;margin-top:3rem;display:none" id="load-more-wrap">
    <button class="btn btn-outline" id="load-more-btn" onclick="loadMore()">Load more</button>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="/static/js/auth.js"></script>
<script src="/static/js/consumer.js"></script>
<script>
  requireAuth();
  window.addEventListener('DOMContentLoaded',()=>{
    const u=localStorage.getItem('sv_username');
    if(u){
      document.getElementById('nav-user').textContent=u;
      document.getElementById('nav-chip').textContent=(localStorage.getItem('sv_role')||'consumer').toUpperCase();
    }
    loadPhotos();
    document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
  });
</script>
</body>
</html>
